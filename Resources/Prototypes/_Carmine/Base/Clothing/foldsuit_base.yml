- type: entity
  parent: ClothingOuterBase
  id: ClothingFoldsuitBase
  abstract: true
  components:
  - type: Appearance
  - type: AllowSuitStorage
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ outerClothing ]
  - type: ItemToggle
  - type: ComponentToggler
    components:
    - type: PressureProtection
      highPressureMultiplier: 0.3
      lowPressureMultiplier: 1000
    - type: TemperatureProtection
      coolingCoefficient: 0.1
      heatingCoefficient: 0.4
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      toggleable-clothing: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.ToggleClothingUiKey.Key:
        type: ToggleableClothingBoundUserInterface
  - type: UseDelay
    delay: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ToggleableClothing
    unfoldSound: /Audio/_Carmine/Foldsuits/airbag.ogg
    foldSound: /Audio/_Carmine/Foldsuits/airbag_reversed.ogg
    timeToFoldPerPiece: 0.1
    foldDoAfterTime: 2
    requiredSlot: outerClothing
    blockUnequipWhenAttached: true
    replaceCurrentClothing: true
    unfoldedEquippedPrefix: unfolded #so this corresponds to "unfolded-equipped-OUTERCLOTHING". this is what changes the in-world sprite.
    clothingPrototypes:
      head: ClothingModsuitHelmetStandard
      shoes: ClothingModsuitBootsStandard
  - type: DoAfter
  - type: GenericVisualizer # for the chestplate to change sprite inhand/in in ventory, when toggled
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: unfolded-icon}
          False: {state: icon}

# HEAD
- type: entity
  abstract: true
  id: ClothingFoldhelmetBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: BreathMask
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01
    coolingCoefficient: 0.01
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: Clickable
  - type: InteractionOutline
  - type: GroupExamine
  - type: HideLayerClothing
    layers:
      HeadTop: HEAD
      HeadSide: HEAD
      Hair: HEAD #carminetodo: reparent this someday
      FacialHair: HEAD
  - type: Clothing
    equipSound: /Audio/_Carmine/Foldsuits/airbag.ogg
    unequipSound: /Audio/_Carmine/Foldsuits/airbag_reversed.ogg
    quickEquip: false
    equippedPrefix: off
    slots: [ HEAD ]
    clothingVisuals:
      head:
      - state: unfolded-equipped-HELMET

# SHOES
- type: entity
  abstract: true
  parent: ClothingShoesBase
  id: ClothingFoldbootsBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Clothing
    equipSound: /Audio/_Carmine/Foldsuits/airbag.ogg
    unequipSound: /Audio/_Carmine/Foldsuits/airbag_reversed.ogg
    slots: [ feet ]
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: ItemToggle
    onUse: false
    onActivate: false
  - type: ToggleClothing
    action: ActionToggleMagboots
    mustEquip: false
  - type: Magboots
