---
- type: gameMap
  id: TestMapCarmine
  mapName: 'Carmine Station'
  mapPath: /Maps/_Carmine/release_devmap.yml
  minPlayers: 0
  stations:
    TestMapCarmine:
      stationProto: TestStation
      gridComponents:
        - type: BlockShipWeaponProjectileGrid
        - type: PreventPilot
        - type: VesselIcon
          iffIcon:
            sprite: _Crescent/ShipIcons/ifficons.rsi
            state: outpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Carmine Devmap - Release'
        # - type: VesselDesignation
        #   designation: vessel-designation-headquarters
        # - type: VesselDescription
        #   description: A place of ample tests.
        # - type: VesselMusic
        #   ambientMusicPrototype: PortBalreskaMusic
        - type: Grammar
          attributes:
            proper: true
        - type: StationJobs
          availableJobs:
            Captain: [ 10, 10 ]
            Passenger: [ 10, 10 ]
        - type: WorldGenDistanceCarver
          distanceThresholds:
            # Dead zone
            - maxDistance: 100 #looks like its chunk based so do these in 128 chunks
              prob: 0.0
            - maxDistance: 200 #looks like its chunk based
              prob: 0.3

