- type: wireLayout
  id: Airlock
  wires:
  - !type:PowerWireAction
  - !type:PowerWireAction
    pulseTimeout: 15
  - !type:LogWireAction
  - !type:DoorBoltWireAction
  - !type:DoorBoltLightWireAction
  - !type:DoorTimingWireAction
  - !type:DoorSafetyWireAction
  - !type:AiInteractWireAction

- type: wireLayout
  id: Vending
  wires:
  - !type:AiInteractWireAction
  - !type:PowerWireAction
  - !type:AccessWireAction
  - !type:LogWireAction
  - !type:VendingMachineContrabandWireAction
  - !type:VendingMachineEjectItemWireAction
  - !type:SpeechWireAction

- type: wireLayout
  id: AirAlarm
  wires:
  - !type:AiInteractWireAction
  - !type:PowerWireAction
  - !type:AccessWireAction
  - !type:LogWireAction
  - !type:AirAlarmPanicWire
  - !type:AtmosMonitorDeviceNetWire

- type: wireLayout
  id: Intercom
  wires:
  - !type:PowerWireAction
  - !type:SpeechWireAction
  - !type:ListenWireAction

- type: wireLayout
  id: FireAlarm
  wires:
  - !type:AiInteractWireAction
  - !type:PowerWireAction
  - !type:AtmosMonitorDeviceNetWire
    alarmOnPulse: true

- type: wireLayout
  id: SurveillanceCamera
  dummyWires: 2
  wires:
  - !type:PowerWireAction
  - !type:AiVisionWireAction

- type: wireLayout
  id: CryoPod
  dummyWires: 2
  wires:
  - !type:PowerWireAction
  - !type:CryoPodEjectLockWireAction

- type: wireLayout
  id: Docking
  dummyWires: 2
  wires:
  - !type:PowerWireAction
  - !type:PowerWireAction
    pulseTimeout: 15
  - !type:LogWireAction
  - !type:DoorBoltWireAction
  - !type:DoorBoltLightWireAction
  - !type:DoorTimingWireAction
  - !type:DoorSafetyWireAction

- type: wireLayout
  id: Defusable
  dummyWires: 3
  wires:
    - !type:ActivateWireAction
    - !type:BoltWireAction
    - !type:DelayWireAction
    - !type:ProceedWireAction
    - !type:BoomWireAction
    - !type:BoomWireAction
    - !type:BoomWireAction

- type: wireLayout
  id: Jukebox
  dummyWires: 2
  wires:
  - !type:PowerWireAction
  - !type:AiInteractWireAction

- type: wireLayout
  id: Computer
  dummyWires: 3
  wires:
  - !type:PowerWireAction

- type: wireLayout
  id: Holopad
  dummyWires: 2
  wires:
  - !type:PowerWireAction
  - !type:AiInteractWireAction
