- type: entity
  parent: BaseWall
  id: WallConsolidatInner1
  name: inner hull
  suffix: "200 HP"
  components:
  - type: Sprite
    sprite: _Carmine/Structures/Walls/consolidat_inner_1.rsi
  - type: Icon
    sprite: _Carmine/Structures/Walls/consolidat_inner_1.rsi
    state: full
  - type: Construction
    graph: Girder
    node: reinforcedWall
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:ChangeConstructionNodeBehavior
        node: girder
      - !type:DoActsBehavior
        acts: ["Destruction"]

