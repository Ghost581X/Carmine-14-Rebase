- type: entity
  parent: [ClothingShoesBase, BaseChameleon]
  id: ClothingShoesChameleon
  name: black shoes
  suffix: Chameleon
  description: Stylish black shoes.
  components:
    - type: Tag
      tags: # ignore "WhitelistChameleon" tag
      - ClothMade
      - Recyclable
    - type: Sprite
      sprite: Clothing/Shoes/color.rsi
      layers:
      - state: icon
        color: "#3f3f3f"
      - state: soles-icon
    - type: Clothing
      sprite: Clothing/Shoes/color.rsi
      clothingVisuals:
        shoes:
        - state: equipped-FEET
          color: "#1d1d1d"
        - state: soles-equipped-FEET
    - type: Item
      inhandVisuals:
        left:
        - state: inhand-left
          color: "#3f3f3f"
        - state: soles-inhand-left
        right:
        - state: inhand-right
          color: "#3f3f3f"
        - state: soles-inhand-right
    - type: ChameleonClothing
      slot: [FEET]
      default: ClothingShoesConsolidatTrench
