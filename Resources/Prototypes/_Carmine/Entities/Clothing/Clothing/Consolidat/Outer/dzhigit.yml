- type: entity
  parent: ClothingOuterBase #not actually foldsuits. he spawns with them and cant take them off.
  id: ClothingSuitDzhigit
  name: dzhigit suit
  description: CARMINETODO
  components:
  - type: Sprite
    sprite: _Carmine/Objects/Clothing/Consolidat/Outer/dzhigit.rsi
    state: icon
  - type: Appearance
  - type: AllowSuitStorage
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ outerClothing ]
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    coolingCoefficient: 0.1
    heatingCoefficient: 0.4
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Unremoveable

- type: entity
  parent: ClothingHeadHelmetBase
  id: ClothingHelmetDzhigit
  name: dzhigit helmet
  description: CARMINETODO
  components:
  - type: Sprite
    sprite: _Carmine/Objects/Clothing/Consolidat/Head/dzhigit.rsi
    state: icon
  - type: Appearance
  - type: BreathMask
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.01
    coolingCoefficient: 0.01
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: Clickable
  - type: InteractionOutline
  - type: GroupExamine
  - type: Unremoveable