#KEYS

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyConsolidat
  name: consolidat encryption key
  description: CARMINETODO
  components:
  - type: EncryptionKey
    channels:
    - Consolidat
    defaultChannel: Common
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label
    
- type: entity
  parent: EncryptionKey
  id: EncryptionKeyAtaman
  name: ataman encryption key
  description: CARMINETODO
  components:
  - type: EncryptionKey
    channels:
    - ConsolidatCouncil
    defaultChannel: Common
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label

#HEADSETS

- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetConsolidat
  name: consolidat headset
  description: CARMINETODO
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyConsolidat
      - EncryptionKeyCommon
  - type: Sprite
    sprite: Clothing/Ears/Headsets/mining.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/mining.rsi
    
- type: entity
  parent: ClothingHeadsetConsolidat
  id: ClothingHeadsetAtaman
  name: ataman headset
  description: CARMINETODO
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyConsolidat
      - EncryptionKeyCommon
      - EncryptionKeyAtaman