- type: entity
  parent: BaseComputer # Mono
  id: ComputerShuttle
  name: shuttle console
  description: Used to pilot a shuttle.
  components:
  - type: ShuttleConsole
  - type: ShipNpcTarget # Mono
    needPower: true
  # - type: ShuttleConsoleLock # carmine: commented out because we havent ported this yet, and we might not want it at all
  - type: ActivatableUI
    key: enum.ShuttleConsoleUiKey.Key
  - type: UserInterface
    interfaces:
        enum.ShuttleConsoleUiKey.Key:
          type: ShuttleConsoleBoundUserInterface
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface
  - type: RadarConsole
    relativePanning: true # Mono
  - type: WorldLoader
    radius: 384 # Mono
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#43ccb5"
  - type: ItemSlots
    slots:
      disk_slot:
        name: Disk
        insertSound:
          path: /Audio/Machines/terminal_insert_disc.ogg
        ejectSound:
          path: /Audio/Machines/terminal_insert_disc.ogg
        whitelist:
          components:
          - ShuttleDestinationCoordinates
  - type: ContainerContainer
    containers:
      board: !type:Container
        ents: []
      disk_slot: !type:ContainerSlot {}
  - type: GuideHelp
    guides:
    - ShuttleCraft
  - type: NoSignalOnLink
  - type: DeviceLinkSource # Mono
    ports:
    - device-button-1
    - device-button-2
    - device-button-3
    - device-button-4
    - device-button-5
    - device-button-6
    - device-button-7
    - device-button-8
  # Mono
  - type: ShipRepairable
    repairTime: 10
    repairCost: 30
  - type: RadarBlip
    visibleFromOtherGrids: true
    radarColor: "#03f8fc"
    scale: 1.5
    shape: diamond
  - type: Sprite
    sprite: _Carmine/Objects/Devices/shuttle_console.rsi
    layers:
    - map: ["computerLayerBody"]
      state: unpowered
    - map: ["computerLayerScreen"]
      state: powered
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: maint_panel
  - type: Computer
    board: ShuttleConsoleCircuitboard
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }

- type: entity
  parent: BaseComputerCircuitboard
  id: ShuttleConsoleCircuitboard
  name: shuttle console board
  description: A computer printed circuit board for a shuttle console.
  components:
  - type: Sprite
    state: cpu_supply
  - type: ComputerBoard
    prototype: ComputerShuttle
