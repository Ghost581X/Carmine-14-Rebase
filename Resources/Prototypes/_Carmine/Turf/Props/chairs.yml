  parent: ChairWooden
  components:
  - type: Sprite
    sprite: _Carmine/Turf/Props/Chairs/wood_chair.rsi
    state: base
  - type: Strap
    buckleSound:
      collection: MaleScreams

- type: entity
  parent: [SeatBase, BaseDeployFoldable]
  id: ChairFolding
  name: folding chair
  description: A foldable chair.
  components:
  - type: Rotatable
  - type: Sprite
    sprite: _Carmine/Turf/Props/Chairs/metal_chair_folding.rsi
    layers:
    - state: base
      map: ["unfoldedLayer"]
    - state: folded
      map: ["foldedLayer"]
      visible: false
  - type: Item
    size: Huge
  - type: Appearance
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud
  - type: DamageExaminable

- type: entity
  parent: ChairFolding
  id: ChairFoldingSpawnFolded
  suffix: folded
  components:
  - type: Foldable
    folded: true
  - type: Strap
    enabled: False

